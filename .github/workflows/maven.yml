name: MuleSoft CloudHub Deploy

on:
  push:
    branches:
      - main        # Trigger on pushes to main branch
  workflow_dispatch:  # Optional: allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Java 17 with Maven caching
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3️⃣ Build & deploy Mule app using Connected App credentials
      - name: Build and deploy Mule app
        run: |
          mvn clean deploy mule:deploy \
          -Dclient.id=${{ secrets.CLIENT_ID }} \
          -Dclient.secret=${{ secrets.CLIENT_SECRET }} \
          -Danypoint.environment=${{ secrets.ANYPOINT_ENV }} \
          -Danypoint.region=${{ secrets.ANYPOINT_REGION }} \
          -Dorg.id=${{ secrets.ORG_ID }}
